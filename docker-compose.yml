services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mocksmith}
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build: ./api
    restart: unless-stopped
    environment:
      PORT: "8080"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: ${MONGO_DB:-mocksmith}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal

  app:
    build: ./app
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - public
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8080}:80"

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  mongo_data:
